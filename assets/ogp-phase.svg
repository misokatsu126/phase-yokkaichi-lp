<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="ogpTitle ogpDesc">
  <title id="ogpTitle">フェイズ四日市店 OGP画像</title>
  <desc id="ogpDesc">フェイズロゴ、宇宙感のあるカードパネル、四日市にカードゲームの新しいフェイズをというコピーを組み合わせたOGP画像</desc>
  <defs>
    <linearGradient id="ogpBg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset=".56" stop-color="#eef5ff"/>
      <stop offset=".72" stop-color="#0a3279"/>
      <stop offset="1" stop-color="#01091f"/>
    </linearGradient>
    <linearGradient id="brush" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#ffe14a"/>
      <stop offset=".48" stop-color="#ffbc1a"/>
      <stop offset="1" stop-color="#ff6f1a"/>
    </linearGradient>
    <filter id="lift" x="-14%" y="-20%" width="128%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#01091f" flood-opacity=".24"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#ogpBg)"/>

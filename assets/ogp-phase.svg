    <text x="86" y="258" fill="#01091f" font-family="Arial Black, Impact, sans-serif" font-size="66" font-weight="900">PHASE</text>
    <path d="M350 218h294l-22 48H328z" fill="#01091f"/>
    <text x="376" y="251" fill="#ffffff" font-family="Arial, sans-serif" font-size="32" font-weight="900">TCG SHOP</text>

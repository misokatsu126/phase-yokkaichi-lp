    <circle cx="926" cy="420" r="1.5" fill="#fff"/>
    <circle cx="1152" cy="492" r="1" fill="#ffd22e"/>
  </g>
  <path d="M614 84C760 28 1008 44 1180 158" fill="none" stroke="#33cfff" stroke-width="3" opacity=".36"/>
  <path d="M636 492C818 384 1016 360 1200 420" fill="none" stroke="#ffd22e" stroke-width="5" opacity=".32"/>
  <path d="M790 104h330l-34 54H756z" fill="#ffd22e"/>

    <rect x="240" y="190" width="42" height="8" rx="4" fill="#005cff" transform="rotate(-10 272 155)"/>
  </g>
  <g filter="url(#lift)">
    <rect x="480" y="102" width="116" height="166" rx="8" fill="#082a6f" transform="rotate(11 538 185)"/>
    <rect x="500" y="126" width="74" height="60" rx="5" fill="#e7354c" transform="rotate(11 538 185)"/>
    <rect x="504" y="204" width="62" height="9" rx="4" fill="#ffc928" transform="rotate(11 538 185)"/>
    <rect x="504" y="226" width="44" height="9" rx="4" fill="#ffffff" opacity=".82" transform="rotate(11 538 185)"/>
  </g>
  <g filter="url(#glow)" opacity=".75">

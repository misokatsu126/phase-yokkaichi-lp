<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" role="img" aria-labelledby="heroVisualTitle heroVisualDesc">
  <title id="heroVisualTitle">宇宙感のあるカードショップビジュアル</title>
  <desc id="heroVisualDesc">ネイビーの宇宙背景に、白いカードパネルと青い光の軌道が浮かぶ近未来的なビジュアル</desc>
  <defs>
    <linearGradient id="space" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#f7fbff"/>
      <stop offset=".38" stop-color="#dfeaff"/>
      <stop offset=".68" stop-color="#092c70"/>
      <stop offset="1" stop-color="#041437"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f2ff"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0" x2="1">
      <stop stop-color="#2ab7ff"/>
      <stop offset="1" stop-color="#005cff"/>
    </linearGradient>
    <linearGradient id="sunLine" x1="0" x2="1">
      <stop stop-color="#ffd642"/>
      <stop offset="1" stop-color="#ff8717"/>
    </linearGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#041437" flood-opacity=".28"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="760" height="560" fill="url(#space)"/>
  <g opacity=".55">
    <circle cx="598" cy="74" r="1.6" fill="#fff"/>
    <circle cx="666" cy="126" r="1.2" fill="#fff"/>
    <circle cx="704" cy="246" r="1.5" fill="#2ab7ff"/>
    <circle cx="552" cy="286" r="1" fill="#fff"/>
    <circle cx="630" cy="384" r="1.4" fill="#fff"/>
    <circle cx="430" cy="82" r="1" fill="#2ab7ff"/>
    <circle cx="494" cy="438" r="1.2" fill="#fff"/>
    <circle cx="716" cy="456" r="1" fill="#ffc928"/>
  </g>
  <path d="M54 96C230 26 506 42 714 154" fill="none" stroke="#2ab7ff" stroke-width="2" opacity=".34"/>
  <path d="M116 455C308 340 528 320 742 378" fill="none" stroke="#ffc928" stroke-width="4" opacity=".34"/>
  <path d="M486 40h178l-22 34H464z" fill="#ffc928" opacity=".95"/>
  <path d="M616 162h144v16H604z" fill="#e7354c" opacity=".86"/>

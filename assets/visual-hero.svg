    <path d="M154 196h390l24 150H178z" fill="#041437"/>
    <path d="M184 222h322l7 44H191z" fill="#2ab7ff" opacity=".28"/>
    <path d="M206 294h316l8 38H214z" fill="#ffffff" opacity=".16"/>
    <path d="M168 376h404l8 28H176z" fill="#005cff" opacity=".9"/>
    <path d="M360 376h150l-14 28H346z" fill="url(#sunLine)"/>
    <path d="M526 376h54l-14 28h-54z" fill="#e7354c"/>
  </g>
  <g filter="url(#lift)">
    <rect x="220" y="80" width="104" height="150" rx="8" fill="#ffffff" transform="rotate(-10 272 155)"/>
    <rect x="238" y="100" width="68" height="52" rx="5" fill="#ffc928" transform="rotate(-10 272 155)"/>
